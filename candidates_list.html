<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registered Candidates</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #2ecc71;
            padding: 35px;
            text-align: center;
            border-bottom: 4px solid #2ecc71;
            border-radius: 10px 10px 0 0;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.2);
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(46, 204, 113, 0.3);
        }

        .header p {
            font-size: 15px;
            color: #aaa;
        }

        /* Navigation */
        .nav-container {
            background: #1a1a1a;
            border: 2px solid #2ecc71;
            border-radius: 0 0 10px 10px;
            padding: 0;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.15);
        }

        .nav-link {
            flex: 1;
            padding: 20px;
            border: none;
            background: #1a1a1a;
            color: #2ecc71;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            border-right: 2px solid #2ecc71;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .nav-link:last-child {
            border-right: none;
        }

        .nav-link:hover {
            background: #2d2d2d;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
        }

        .nav-link.active {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: #000;
        }

        @media (max-width: 768px) {
            .nav-link {
                border-right: none;
                border-bottom: 2px solid #2ecc71;
                padding: 15px;
            }

            .nav-link:last-child {
                border-bottom: none;
            }
        }

        /* List Section */
        .list-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 1200px) {
            .list-container {
                grid-template-columns: 1fr;
            }
        }

        .list-section {
            background: #1a1a1a;
            border: 2px solid #2ecc71;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(46, 204, 113, 0.2);
        }

        .list-section h2 {
            color: #2ecc71;
            margin-bottom: 20px;
            font-size: 24px;
            padding-bottom: 15px;
            border-bottom: 3px solid #2ecc71;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-shadow: 0 1px 5px rgba(46, 204, 113, 0.2);
        }

        .count-badge {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: #000;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .items-list {
            max-height: 700px;
            overflow-y: auto;
            padding: 0;
        }

        .item {
            padding: 16px;
            border-bottom: 1px solid #2d2d2d;
            background: #2d2d2d;
            margin-bottom: 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: all 0.3s;
        }

        .item:hover {
            background: #353535;
            border-left: 4px solid #2ecc71;
            padding-left: 12px;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.2);
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            color: #2ecc71;
            margin-bottom: 8px;
            text-shadow: 0 1px 3px rgba(46, 204, 113, 0.2);
            font-size: 16px;
        }

        .item-details {
            font-size: 13px;
            color: #aaa;
            line-height: 1.8;
        }

        .item-details span {
            display: block;
            margin-bottom: 4px;
        }

        .item-details span strong {
            color: #2ecc71;
        }

        .btn-delete {
            background: #c0392b;
            color: white;
            padding: 7px 14px;
            border: 2px solid #e74c3c;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
            margin-left: 10px;
        }

        .btn-delete:hover {
            background: #a93226;
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
        }

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-style: italic;
        }

        .export-btn {
            display: block;
            margin-top: 20px;
            background: linear-gradient(135deg, #1a4d33 0%, #2d6b47 100%);
            color: #2ecc71;
            padding: 12px 20px;
            border: 2px solid #2ecc71;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
            width: 100%;
            text-decoration: none;
        }

        .export-btn:hover {
            background: linear-gradient(135deg, #2d6b47 0%, #3d8b57 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        /* Scrollbar styling */
        .items-list::-webkit-scrollbar {
            width: 8px;
        }

        .items-list::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 10px;
        }

        .items-list::-webkit-scrollbar-thumb {
            background: #2ecc71;
            border-radius: 10px;
        }

        .items-list::-webkit-scrollbar-thumb:hover {
            background: #27ae60;
        }

        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #1a3a2e 0%, #2d6b47 100%);
            border: 2px solid #2ecc71;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.2);
        }

        .stat-card h3 {
            color: #2ecc71;
            font-size: 14px;
            margin-bottom: 10px;
            text-shadow: 0 1px 3px rgba(46, 204, 113, 0.2);
        }

        .stat-number {
            font-size: 48px;
            font-weight: bold;
            color: #2ecc71;
            text-shadow: 0 2px 10px rgba(46, 204, 113, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📋 Registered Candidates</h1>
            <p>View all registered students and teachers</p>
        </div>

        <!-- Navigation -->
        <div class="nav-container">
            <a href="student_reg.html" class="nav-link">👨‍🎓 Student Registration</a>
            <a href="teacher_reg.html" class="nav-link">👨‍🏫 Teacher Registration</a>
            <a href="candidates_list.html" class="nav-link active">📋 Registered Candidates</a>
        </div>

        <!-- Statistics -->
        <div class="stats-container">
            <div class="stat-card">
                <h3>👨‍🎓 Total Students</h3>
                <div class="stat-number" id="totalStudents">0</div>
            </div>
            <div class="stat-card">
                <h3>👨‍🏫 Total Teachers</h3>
                <div class="stat-number" id="totalTeachers">0</div>
            </div>
        </div>

        <!-- Lists Container -->
        <div class="list-container">
            <!-- Students List -->
            <div class="list-section">
                <h2>
                    <span>👨‍🎓 Students</span>
                    <span class="count-badge" id="studentCount">0</span>
                </h2>
                <div id="studentsList" class="items-list">
                    <div class="empty-message">No students registered yet.</div>
                </div>
                <button class="export-btn" onclick="exportData('student')">📥 Export Students</button>
            </div>

            <!-- Teachers List -->
            <div class="list-section">
                <h2>
                    <span>👨‍🏫 Teachers</span>
                    <span class="count-badge" id="teacherCount">0</span>
                </h2>
                <div id="teachersList" class="items-list">
                    <div class="empty-message">No teachers registered yet.</div>
                </div>
                <button class="export-btn" onclick="exportData('teacher')">📥 Export Teachers</button>
            </div>
        </div>
    </div>

    <script>
        let registrations = {
            students: JSON.parse(localStorage.getItem('students')) || [],
            teachers: JSON.parse(localStorage.getItem('teachers')) || []
        };

        const sampleStudents = [
            { name: 'Aarav Kumar', email: 'aarav.kumar@email.com', phone: '9876543210', rollNo: '001', class: '12th', branch: 'Science' },
            { name: 'Bhavna Singh', email: 'bhavna.singh@email.com', phone: '9876543211', rollNo: '002', class: '12th', branch: 'Science' },
            { name: 'Chirag Patel', email: 'chirag.patel@email.com', phone: '9876543212', rollNo: '003', class: '11th', branch: 'Commerce' },
            { name: 'Diya Sharma', email: 'diya.sharma@email.com', phone: '9876543213', rollNo: '004', class: '11th', branch: 'Arts' },
            { name: 'Eshan Gupta', email: 'eshan.gupta@email.com', phone: '9876543214', rollNo: '005', class: 'Senior', branch: 'Engineering' },
            { name: 'Fatima Khan', email: 'fatima.khan@email.com', phone: '9876543215', rollNo: '006', class: 'Senior', branch: 'Engineering' },
            { name: 'Gaurav Verma', email: 'gaurav.verma@email.com', phone: '9876543216', rollNo: '007', class: 'Junior', branch: 'Computer Science' },
            { name: 'Hima Das', email: 'hima.das@email.com', phone: '9876543217', rollNo: '008', class: 'Junior', branch: 'Science' },
            { name: 'Ishaan Malhotra', email: 'ishaan.malhotra@email.com', phone: '9876543218', rollNo: '009', class: 'Sophomore', branch: 'Engineering' },
            { name: 'Jasmine Roy', email: 'jasmine.roy@email.com', phone: '9876543219', rollNo: '010', class: 'Freshman', branch: 'Computer Science' },
            { name: 'Kabir Singh', email: 'kabir.singh@email.com', phone: '9876543220', rollNo: '011', class: '10th', branch: 'Science' },
            { name: 'Lakshmi Nair', email: 'lakshmi.nair@email.com', phone: '9876543221', rollNo: '012', class: '10th', branch: 'Commerce' },
            { name: 'Manas Desai', email: 'manas.desai@email.com', phone: '9876543222', rollNo: '013', class: 'Freshman', branch: 'Engineering' }
        ];

        const sampleTeachers = [
            { name: 'Dr. Rajesh Kumar', email: 'rajesh.kumar@school.com', phone: '9876543230', employeeId: 'EMP001', qualification: 'M.Tech, PhD', subject: 'Mathematics, Physics', experience: '12' },
            { name: 'Prof. Anjali Sharma', email: 'anjali.sharma@school.com', phone: '9876543231', employeeId: 'EMP002', qualification: 'M.Sc', subject: 'Chemistry, Biology', experience: '8' },
            { name: 'Mr. Vikram Singh', email: 'vikram.singh@school.com', phone: '9876543232', employeeId: 'EMP003', qualification: 'B.Tech', subject: 'Computer Science, IT', experience: '6' },
            { name: 'Mrs. Priya Gupta', email: 'priya.gupta@school.com', phone: '9876543233', employeeId: 'EMP004', qualification: 'M.A', subject: 'English, Literature', experience: '10' },
            { name: 'Dr. Arjun Patel', email: 'arjun.patel@school.com', phone: '9876543234', employeeId: 'EMP005', qualification: 'PhD', subject: 'History, Social Studies', experience: '15' },
            { name: 'Miss. Dimple Khan', email: 'dimple.khan@school.com', phone: '9876543235', employeeId: 'EMP006', qualification: 'M.Com', subject: 'Accountancy, Business Studies', experience: '7' },
            { name: 'Prof. Suresh Reddy', email: 'suresh.reddy@school.com', phone: '9876543236', employeeId: 'EMP007', qualification: 'M.Sc', subject: 'Statistics, Mathematics', experience: '9' },
            { name: 'Mrs. Neha Iyer', email: 'neha.iyer@school.com', phone: '9876543237', employeeId: 'EMP008', qualification: 'B.Ed', subject: 'Physical Education', experience: '5' },
            { name: 'Mr. Rohan Desai', email: 'rohan.desai@school.com', phone: '9876543238', employeeId: 'EMP009', qualification: 'MFA', subject: 'Art, Design', experience: '4' },
            { name: 'Dr. Meera Verma', email: 'meera.verma@school.com', phone: '9876543239', employeeId: 'EMP010', qualification: 'M.Sc, PhD', subject: 'Physics, Electronics', experience: '11' },
            { name: 'Prof. Ajay Nair', email: 'ajay.nair@school.com', phone: '9876543240', employeeId: 'EMP011', qualification: 'M.Tech', subject: 'Engineering, Technology', experience: '8' },
            { name: 'Mrs. Sapna Chopra', email: 'sapna.chopra@school.com', phone: '9876543241', employeeId: 'EMP012', qualification: 'M.A', subject: 'Hindi, Sanskrit', experience: '6' }
        ];

        window.addEventListener('DOMContentLoaded', function () {
            loadSampleData();
            displayLists();
        });

        function loadSampleData() {
            if (registrations.students.length === 0) {
                sampleStudents.forEach(s => {
                    registrations.students.push({
                        id: Date.now() + Math.random(),
                        ...s,
                        registeredOn: new Date().toLocaleString()
                    });
                });
                localStorage.setItem('students', JSON.stringify(registrations.students));
            }

            if (registrations.teachers.length === 0) {
                sampleTeachers.forEach(t => {
                    registrations.teachers.push({
                        id: Date.now() + Math.random(),
                        ...t,
                        registeredOn: new Date().toLocaleString()
                    });
                });
                localStorage.setItem('teachers', JSON.stringify(registrations.teachers));
            }
        }

        function displayLists() {
            displayStudents();
            displayTeachers();
        }

        function displayStudents() {
            const studentsList = document.getElementById('studentsList');
            document.getElementById('studentCount').textContent = registrations.students.length;
            document.getElementById('totalStudents').textContent = registrations.students.length;

            if (registrations.students.length === 0) {
                studentsList.innerHTML = '<div class="empty-message">No students registered yet.</div>';
                return;
            }

            studentsList.innerHTML = registrations.students.map(s => `
                <div class="item">
                    <div class="item-info">
                        <div class="item-name">${s.name}</div>
                        <div class="item-details">
                            <span><strong>Email:</strong> ${s.email}</span>
                            <span><strong>Phone:</strong> ${formatPhoneDisplay(s.phone)}</span>
                            <span><strong>Roll No:</strong> ${s.rollNo}</span>
                            <span><strong>Class:</strong> ${s.class}</span>
                            <span><strong>Branch:</strong> ${s.branch}</span>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteStudent(${s.id})">Delete</button>
                </div>
            `).join('');
        }

        function displayTeachers() {
            const teachersList = document.getElementById('teachersList');
            document.getElementById('teacherCount').textContent = registrations.teachers.length;
            document.getElementById('totalTeachers').textContent = registrations.teachers.length;

            if (registrations.teachers.length === 0) {
                teachersList.innerHTML = '<div class="empty-message">No teachers registered yet.</div>';
                return;
            }

            teachersList.innerHTML = registrations.teachers.map(t => `
                <div class="item">
                    <div class="item-info">
                        <div class="item-name">${t.name}</div>
                        <div class="item-details">
                            <span><strong>Email:</strong> ${t.email}</span>
                            <span><strong>Phone:</strong> ${formatPhoneDisplay(t.phone)}</span>
                            <span><strong>Emp ID:</strong> ${t.employeeId}</span>
                            <span><strong>Qualification:</strong> ${t.qualification}</span>
                            <span><strong>Subjects:</strong> ${t.subject}</span>
                            <span><strong>Experience:</strong> ${t.experience} years</span>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteTeacher(${t.id})">Delete</button>
                </div>
            `).join('');
        }

        function formatPhoneDisplay(phone) {
            return phone.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3');
        }

        function deleteStudent(id) {
            if (confirm('Delete this student?')) {
                registrations.students = registrations.students.filter(s => s.id !== id);
                localStorage.setItem('students', JSON.stringify(registrations.students));
                displayLists();
            }
        }

        function deleteTeacher(id) {
            if (confirm('Delete this teacher?')) {
                registrations.teachers = registrations.teachers.filter(t => t.id !== id);
                localStorage.setItem('teachers', JSON.stringify(registrations.teachers));
                displayLists();
            }
        }

        function exportData(role) {
            const data = role === 'student' ? registrations.students : registrations.teachers;
            if (data.length === 0) {
                alert('No data to export!');
                return;
            }

            let csv = role === 'student'
                ? 'S.No,Name,Email,Phone,Roll No,Class,Branch,Registered On\n'
                : 'S.No,Name,Email,Phone,Employee ID,Qualification,Subjects,Experience,Registered On\n';

            data.forEach((item, index) => {
                if (role === 'student') {
                    csv += `${index + 1},"${item.name}","${item.email}","${formatPhoneDisplay(item.phone)}","${item.rollNo}","${item.class}","${item.branch}","${item.registeredOn}"\n`;
                } else {
                    csv += `${index + 1},"${item.name}","${item.email}","${formatPhoneDisplay(item.phone)}","${item.employeeId}","${item.qualification}","${item.subject}","${item.experience}","${item.registeredOn}"\n`;
                }
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${role}s_${new Date().toISOString().slice(0, 10)}.csv`;
            link.click();
        }
    </script>
</body>
</html>
